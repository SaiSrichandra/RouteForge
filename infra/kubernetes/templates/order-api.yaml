apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-api
  namespace: __NAMESPACE__
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: order-api
  template:
    metadata:
      labels:
        app: order-api
    spec:
      containers:
        - name: order-api
          image: __ORDER_API_IMAGE__
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dor-app-secrets
                  key: DATABASE_URL
            - name: TEMPORAL_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: dor-app-config
                  key: TEMPORAL_ADDRESS
            - name: TEMPORAL_TASK_QUEUE
              valueFrom:
                configMapKeyRef:
                  name: dor-app-config
                  key: TEMPORAL_TASK_QUEUE
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 150m
              memory: 192Mi
            limits:
              cpu: 1000m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: order-api
  namespace: __NAMESPACE__
spec:
  selector:
    app: order-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: order-api-public
  namespace: __NAMESPACE__
spec:
  type: LoadBalancer
  selector:
    app: order-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
