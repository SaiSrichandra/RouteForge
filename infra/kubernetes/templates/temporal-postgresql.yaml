apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-postgresql
  namespace: __NAMESPACE__
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: temporal-postgresql
  template:
    metadata:
      labels:
        app: temporal-postgresql
    spec:
      enableServiceLinks: false
      containers:
        - name: postgresql
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "temporal"
            - name: POSTGRES_PASSWORD
              value: "temporal"
            - name: POSTGRES_DB
              value: "temporal"
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-postgresql
  namespace: __NAMESPACE__
spec:
  selector:
    app: temporal-postgresql
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
