apiVersion: batch/v1
kind: Job
metadata:
  name: dor-seed-data
  namespace: __NAMESPACE__
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        job: dor-seed-data
    spec:
      restartPolicy: Never
      containers:
        - name: seed-data
          image: python:3.11-slim
          env:
            - name: DATABASE_URL
              value: "__DATABASE_URL__"
          command:
            - /bin/sh
            - -lc
            - |
              pip install --no-cache-dir "psycopg[binary]==3.2.9" >/tmp/pip.log
              python - <<'PY'
              import json
              import os
              import random
              import uuid
              from decimal import Decimal

              import psycopg

              database_url = os.environ["DATABASE_URL"].replace("postgresql+psycopg://", "postgresql://", 1)
              products = [f"SKU-{index:03d}" for index in range(1, 101)]
              featured_inventory = {
                  "SKU-001": (25, 40),
                  "SKU-002": (18, 30),
                  "SKU-003": (12, 20),
                  "SKU-004": (12, 20),
                  "SKU-005": (12, 20),
                  "SKU-006": (12, 20),
                  "SKU-010": (60, 90),
                  "SKU-011": (45, 70),
              }
              warehouses = [
                  {
                      "code": "NJ",
                      "name": "New Jersey Fulfillment Center",
                      "supported_zones": ["east", "northeast", "central"],
                      "shipping_cost_multiplier": Decimal("1.10"),
                      "daily_capacity": 220,
                      "current_load": 88,
                      "active": True,
                  },
                  {
                      "code": "TX",
                      "name": "Dallas Fulfillment Center",
                      "supported_zones": ["east", "central", "south", "southwest"],
                      "shipping_cost_multiplier": Decimal("0.95"),
                      "daily_capacity": 260,
                      "current_load": 107,
                      "active": True,
                  },
                  {
                      "code": "NV",
                      "name": "Reno Fulfillment Center",
                      "supported_zones": ["west", "southwest", "central"],
                      "shipping_cost_multiplier": Decimal("0.90"),
                      "daily_capacity": 180,
                      "current_load": 72,
                      "active": True,
                  },
              ]

              with psycopg.connect(database_url) as conn:
                  with conn.cursor() as cur:
                      for warehouse in warehouses:
                          cur.execute(
                              """
                              INSERT INTO warehouses (id, code, name, supported_zones, shipping_cost_multiplier, daily_capacity, current_load, active)
                              VALUES (%s, %s, %s, %s, %s, %s, %s, %s)
                              ON CONFLICT (code) DO UPDATE
                              SET name = EXCLUDED.name,
                                  supported_zones = EXCLUDED.supported_zones,
                                  shipping_cost_multiplier = EXCLUDED.shipping_cost_multiplier,
                                  daily_capacity = EXCLUDED.daily_capacity,
                                  current_load = EXCLUDED.current_load,
                                  active = EXCLUDED.active
                              RETURNING id
                              """,
                              (
                                  uuid.uuid4(),
                                  warehouse["code"],
                                  warehouse["name"],
                                  json.dumps(warehouse["supported_zones"]),
                                  warehouse["shipping_cost_multiplier"],
                                  warehouse["daily_capacity"],
                                  warehouse["current_load"],
                                  warehouse["active"],
                              ),
                          )
                          warehouse_id = cur.fetchone()[0]
                          for sku in products:
                              if sku in featured_inventory:
                                  low, high = featured_inventory[sku]
                                  available_qty = random.randint(low, high)
                              elif random.random() < 0.85:
                                  available_qty = random.randint(5, 10)
                              else:
                                  available_qty = random.randint(11, 16)
                              cur.execute(
                                  """
                                  INSERT INTO inventory (id, warehouse_id, sku, available_qty, reserved_qty)
                                  VALUES (%s, %s, %s, %s, %s)
                                  ON CONFLICT (warehouse_id, sku) DO UPDATE
                                  SET available_qty = EXCLUDED.available_qty,
                                      reserved_qty = EXCLUDED.reserved_qty
                                  """,
                                  (uuid.uuid4(), warehouse_id, sku, available_qty, 0),
                              )
                  conn.commit()
              PY
