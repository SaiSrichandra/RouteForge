apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: __NAMESPACE__
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: __DASHBOARD_IMAGE__
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 192Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: __NAMESPACE__
spec:
  type: LoadBalancer
  selector:
    app: dashboard
  ports:
    - name: http
      port: 80
      targetPort: 80
