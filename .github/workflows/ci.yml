name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff
          python -m pip install -r services/order-api/requirements.txt
          python -m pip install -r services/inventory-service/requirements.txt
          python -m pip install -r services/routing-engine/requirements.txt
          python -m pip install -r services/workflow-worker/requirements.txt

      - name: Lint Python
        run: python -m ruff check services scripts

      - name: Compile Python modules
        run: python -m compileall services scripts

      - name: Run routing engine tests
        env:
          PYTHONPATH: services/routing-engine
        run: python -m pytest services/routing-engine/tests -q

      - name: Run order API integration tests
        env:
          PYTHONPATH: services/order-api
        run: python -m pytest services/order-api/tests -q

      - name: Run inventory service integration tests
        env:
          PYTHONPATH: services/inventory-service
        run: python -m pytest services/inventory-service/tests -q

      - name: Run workflow worker tests
        env:
          PYTHONPATH: services/workflow-worker
        run: python -m pytest services/workflow-worker/tests -q

      - name: Run inventory cache benchmark
        run: python scripts/benchmark_inventory_cache.py | tee benchmark_inventory_cache.txt

      - name: Publish benchmark summary
        run: |
          echo "## Inventory Cache Benchmark" >> "$GITHUB_STEP_SUMMARY"
          cat benchmark_inventory_cache.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: inventory-cache-benchmark
          path: benchmark_inventory_cache.txt

  frontend-build:
    name: Frontend Build (${{ matrix.frontend.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        frontend:
          - name: dashboard
            path: frontend/dashboard
            lockfile: frontend/dashboard/package-lock.json
          - name: order-request-console
            path: frontend/order-request-console
            lockfile: frontend/order-request-console/package-lock.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ${{ matrix.frontend.lockfile }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ${{ matrix.frontend.path }}

      - name: Build frontend
        run: npm run build
        working-directory: ${{ matrix.frontend.path }}

  docker-builds:
    name: Docker Build (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    needs:
      - backend-checks
      - frontend-build
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: order-api
            context: services/order-api
          - name: inventory-service
            context: services/inventory-service
          - name: routing-engine
            context: services/routing-engine
          - name: workflow-worker
            context: services/workflow-worker
          - name: dashboard
            context: frontend/dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: false
          tags: dor/${{ matrix.service.name }}:ci
