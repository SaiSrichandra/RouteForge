services:
  postgres:
    image: postgres:16
    container_name: dor-postgres
    environment:
      POSTGRES_DB: order_routing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d order_routing"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.25.2
    container_name: dor-temporal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.31.2
    container_name: dor-temporal-ui
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8088:8080"

  order-api:
    build:
      context: ./services/order-api
    container_name: dor-order-api
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/order_routing
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_TASK_QUEUE: order-routing-task-queue
    ports:
      - "8000:8000"

  inventory-service:
    build:
      context: ./services/inventory-service
    container_name: dor-inventory-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/order_routing
    ports:
      - "8001:8001"

  routing-engine:
    build:
      context: ./services/routing-engine
    container_name: dor-routing-engine
    ports:
      - "8002:8002"

  workflow-worker:
    build:
      context: ./services/workflow-worker
    container_name: dor-workflow-worker
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      inventory-service:
        condition: service_started
      routing-engine:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/order_routing
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_TASK_QUEUE: order-routing-task-queue
      INVENTORY_SERVICE_URL: http://inventory-service:8001
      ROUTING_SERVICE_URL: http://routing-engine:8002
      METRICS_PORT: 9100
    ports:
      - "9100:9100"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: dor-prometheus
    depends_on:
      - order-api
      - inventory-service
      - routing-engine
      - workflow-worker
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.1.4
    container_name: dor-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  postgres_data:
